<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floricultura Encanto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🌸 Floricultura Encanto</h1>
    <button onclick="cadastro.classList.remove('oculto')">Adicionar Flor</button>
  </header>

  <main></main>

  <div id="cadastro" class="modal oculto">
    <div class="janela">
      <h2>Adicionar Flor</h2>
      <form id="formCad">
        <label>Nome da Flor</label>
        <input type="text" id="nome" required>

        <label>Categoria</label>
        <input type="text" id="categoria" required>

        <label>Marca</label>
        <input type="text" id="marca">

        <label>Preço</label>
        <input type="number" id="preco" required>

        <label>URL da Imagem</label>
        <input type="text" id="imagem">

        <br><br>
        <button type="reset" onclick="cadastro.classList.add('oculto')">Cancelar</button>
        <button type="submit">Salvar</button>
      </form>
    </div>
  </div>

  <div id="detalhes" class="modal oculto">
    <div class="janela">
      <h2 id="tituloFlor"></h2>
      <img id="imgFlor">

      <p><b>Nome</b></p>
      <input type="text" id="nomeEdit">

      <p><b>Categoria</b></p>
      <input type="text" id="categoriaEdit">

      <p><b>Marca</b></p>
      <input type="text" id="marcaEdit">

      <p><b>Preço</b></p>
      <input type="number" id="precoEdit">

      <p><b>Imagem (URL)</b></p>
      <input type="text" id="imagemEdit">

      <br><br>
      <button onclick="salvarEdicao()">Salvar</button>
      <button onclick="excluirFlorAtual()">Excluir</button>
      <button onclick="detalhes.classList.add('oculto')">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
